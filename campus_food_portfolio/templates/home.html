
<!DOCTYPE html>
<html>
<head>
<title>Campus Food</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
<h2 class="text-danger">🍴 Campus Zomato</h2>
<a href="/cart" class="btn btn-warning">Cart</a>
<hr>
<div class="row">
{% for f in foods %}
<div class="col-md-4">
<div class="card p-3 shadow">
<h4>{{f[1]}}</h4>
<p>₹{{f[2]}}</p>
<p class="text-muted">{{f[3]}}</p>
<a href="/add/{{f[0]}}" class="btn btn-danger">Add to Cart</a>
</div>
</div>
{% endfor %}
</div>
</div>
</body>
</html>
